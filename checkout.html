<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付款 - Launch 101</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
    }
    .card {
      background: #fff;
      padding: 40px 48px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
      max-width: 420px;
    }
    h1 { font-size: 24px; margin-bottom: 12px; color: #1d1d1f; }
    p { color: #6e6e73; margin-bottom: 24px; line-height: 1.5; }
    .pay-btn {
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #635bff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
    .pay-btn:disabled { background: #c7c7cc; cursor: not-allowed; }
    .back { display: inline-block; margin-top: 16px; color: #6e6e73; font-size: 14px; text-decoration: none; }
    .back:hover { color: #1d1d1f; }
  </style>
</head>
<body>
  <div class="card">
    <h1>结账</h1>
    <p>Stripe 支付即将接入。点击下方按钮将跳转 Stripe Checkout。</p>
    <button class="pay-btn" id="checkout" onclick="startCheckout()">使用 Stripe 付款</button>
    <a href="/" class="back">← 返回首页</a>
  </div>
  <script>
    async function startCheckout() {
      const btn = document.getElementById('checkout');
      btn.disabled = true;
      btn.textContent = '跳转中...';
      try {
        const res = await fetch('/api/checkout', { method: 'POST' });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('Stripe 还未接入，请先在 /api/checkout.js 中配置。');
          btn.disabled = false;
          btn.textContent = '使用 Stripe 付款';
        }
      } catch (e) {
        alert('请求失败：' + e.message);
        btn.disabled = false;
        btn.textContent = '使用 Stripe 付款';
      }
    }
  </script>
</body>
</html>
